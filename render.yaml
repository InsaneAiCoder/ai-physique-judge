services:
  - type: web
    name: ai-physique-judge-backend
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm run backend
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: OPENAI_API_KEY
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
